<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" role="img" aria-labelledby="title desc">
  <title id="title">Decryption process</title>
  <desc id="desc">A diagram showing cipher text letters shifting backward into the original message.</desc>
  <rect width="760" height="430" rx="24" fill="#f7faff"/>
  <rect x="38" y="42" width="684" height="346" rx="22" fill="#ffffff" stroke="#dfe7f5" stroke-width="2"/>
  <text x="70" y="92" fill="#16845b" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="800">Decryption: move letters backward</text>
  <text x="70" y="126" fill="#657083" font-family="Segoe UI, Arial, sans-serif" font-size="15">Use the same shift value in reverse</text>
  <g font-family="Consolas, monospace" font-weight="800" text-anchor="middle">
    <rect x="76" y="174" width="78" height="78" rx="16" fill="#e9f8f2"/>
    <text x="115" y="224" fill="#16845b" font-size="32">D</text>
    <path d="M250 213 H171" stroke="#16845b" stroke-width="8" stroke-linecap="round"/>
    <path d="M171 213 l18 -14 v28 z" fill="#16845b"/>
    <rect x="272" y="174" width="78" height="78" rx="16" fill="#eaf1ff"/>
    <text x="311" y="224" fill="#2e6de6" font-size="32">A</text>
    <text x="214" y="194" fill="#16845b" font-size="18">-3</text>
    <rect x="412" y="174" width="78" height="78" rx="16" fill="#e9f8f2"/>
    <text x="451" y="224" fill="#16845b" font-size="32">घ</text>
    <path d="M586 213 H507" stroke="#16845b" stroke-width="8" stroke-linecap="round"/>
    <path d="M507 213 l18 -14 v28 z" fill="#16845b"/>
    <rect x="608" y="174" width="78" height="78" rx="16" fill="#eaf1ff"/>
    <text x="647" y="224" fill="#2e6de6" font-size="32">क</text>
    <text x="550" y="194" fill="#16845b" font-size="18">-3</text>
  </g>
  <g fill="#657083" font-family="Segoe UI, Arial, sans-serif" font-size="17">
    <circle cx="98" cy="316" r="7" fill="#16845b"/>
    <text x="118" y="322">Cipher text goes in</text>
    <circle cx="314" cy="316" r="7" fill="#16845b"/>
    <text x="334" y="322">Letters shift backward</text>
    <circle cx="558" cy="316" r="7" fill="#2e6de6"/>
    <text x="578" y="322">Original message returns</text>
  </g>
</svg>
